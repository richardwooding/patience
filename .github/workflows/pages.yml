name: pages
on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "internal/**"
      - "main.go"
      - "go.mod"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

# Allow the Pages deployment; one concurrent deploy at a time.
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Build wasm
        run: |
          GOOS=js GOARCH=wasm go build -trimpath -ldflags="-s -w" -o docs/play/patience.wasm .
          cp "$(go env GOROOT)/lib/wasm/wasm_exec.js" docs/play/
      - name: Size report
        run: |
          ls -lh docs/play/patience.wasm
          echo "gzipped: $(gzip -9 -c docs/play/patience.wasm | wc -c) bytes"
      - uses: actions/configure-pages@v6
        with:
          enablement: true # create/enable the Pages site if it isn't already
      - uses: actions/upload-pages-artifact@v5
        with:
          path: docs
      - id: deployment
        uses: actions/deploy-pages@v5
